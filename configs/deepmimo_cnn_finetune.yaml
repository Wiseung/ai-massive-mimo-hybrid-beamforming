model:
  name: cnn
  hybrid: false
  condition_on_snr: true
  snr_embed_dim: 16
  base_channels: 32
  pool_factor: 2
  hidden_dims: [1024, 512]
  residual_to_mrt: true

training:
  epochs: 8
  batch_size: 128
  lr: 0.0005
  weight_decay: 0.0
  seed: 42
  num_workers: 0
  lambda_power: 0.01
  lambda_const: 0.0
  amp: true
  val_fraction: 0.2

evaluation:
  batch_size: 128
