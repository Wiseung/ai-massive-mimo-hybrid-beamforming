dataset:
  type: synthetic_ofdm
  batch_size: 128
  num_batches_per_epoch: 50
  num_val_batches: 10
  num_subcarriers: 8
  num_users: 4
  num_bs_ant: 16
  channel_model: rayleigh
  sparse_mmwave_like: false
  num_paths: 3
  snr_db_train: [0, 5, 10, 15, 20]
  snr_db_eval: [-5, 0, 5, 10, 15, 20]

model:
  name: sionna_ofdm_unfolded_lite
  hidden_dim: 128
  init_method: wmmse_iter_2
  num_layers: 3
  learnable_step_size: true
  condition_on_snr: true
  step_size_init: 0.05

training:
  epochs: 20
  batch_size: 128
  lr: 0.001
  optimizer: adam
  grad_clip: 1.0
  seed: 42
  device: auto

loss:
  type: negative_sum_rate_plus_mse
  sum_rate_weight: 1.0
  mse_weight: 0.05
  power_penalty: 0.01
