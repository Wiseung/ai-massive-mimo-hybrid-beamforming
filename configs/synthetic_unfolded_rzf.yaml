model:
  name: unfolded_rzf
  num_layers: 5
  alpha_init: 0.05

training:
  epochs: 8
  batch_size: 256
  lr: 0.0005
  weight_decay: 0.0
  seed: 42
  num_workers: 0
  lambda_power: 0.01
  lambda_const: 0.0
  lambda_delta: 0.0
  amp: true
  val_fraction: 0.1
  selection_metric: val_sum_rate
  selection_mode: max

evaluation:
  batch_size: 256
