model:
  name: residual_wmmse
  base_method: wmmse
  condition_on_snr: true
  base_channels: 32
  pool_factor: 2
  hidden_dims: [512, 256]
  learnable_alpha: true
  alpha_init: 0.02

training:
  epochs: 8
  batch_size: 192
  lr: 0.0005
  weight_decay: 0.0
  seed: 42
  num_workers: 0
  lambda_power: 0.01
  lambda_const: 0.0
  lambda_delta: 0.02
  amp: true
  val_fraction: 0.1
  selection_metric: val_sum_rate
  selection_mode: max

evaluation:
  batch_size: 192
